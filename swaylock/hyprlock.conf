general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.05
    brightness = 0.7
    vibrancy = 0.2
}

# CLOCK ‚ÄĒ top left
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +'%H:%M')</b>"
    color = rgba(cdd6f4ee)
    font_size = 110
    font_family = JetBrainsMono Nerd Font
    position = 80, -60
    halign = left
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +'%A %d %B'
    color = rgba(9399b2dd)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 88, -205
    halign = left
    valign = top
}

# GREETING
label {
    monitor =
    text = cmd[update:3600000] bash -c 'h=$(date +%H); u=$USER; if [ $h -lt 6 ]; then echo "ůįĖĒ  Good night, $u"; elif [ $h -lt 12 ]; then echo "Good morning, $u"; elif [ $h -lt 18 ]; then echo "Good afternoon, $u"; else echo "Good evening, $u"; fi'
    color = rgba(cba6f7cc)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 90, -255
    halign = left
    valign = top
}

# STATS
label {
    monitor =
    text = cmd[update:5000] echo "ůįĽ† $(top -bn1 | awk '/Cpu/{print int($2+$4)}')%   ůįćõ $(free | awk '/Mem/{printf "%.0f", $3/$2*100}')%   ůįčä $(df / | awk 'NR==2{print $5}')"
    color = rgba(6c7086cc)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 90, -292
    halign = left
    valign = top
}

# MUSIC
label {
    monitor =
    text = cmd[update:3000] bash $HOME/.config/swaylock/music.sh
    color = rgba(a6adc8bb)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 90, -316
    halign = left
    valign = top
}

# AVATAR ‚ÄĒ centered
image {
    monitor =
    path = $HOME/.config/swaylock/img/pp.png
    size = 160
    rounding = -1
    border_size = 4
    border_color = rgb(cba6f7)
    position = 0, 60
    halign = center
    valign = center
}

# USERNAME
label {
    monitor =
    text = cmd[update:0] echo "$USER"
    color = rgba(cdd6f4cc)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -40
    halign = center
    valign = center
}

# PASSWORD INPUT
input-field {
    monitor =
    size = 220, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(1e1e2ecc)
    inner_color = rgba(1e1e2ecc)
    font_color = rgb(cdd6f4)
    fade_on_empty = true
    placeholder_text = <i>ůįĆĺ  password...</i>
    rounding = 25
    check_color = rgb(89b4fa)
    fail_color = rgb(f38ba8)
    fail_text = <i>ůįÖô  $FAIL ($ATTEMPTS)</i>
    capslock_color = rgb(f9e2af)
    position = 0, -100
    halign = center
    valign = center
}

# QUOTE ‚ÄĒ bottom center
label {
    monitor =
    text = cmd[update:0] echo "$(shuf -n1 $HOME/.config/swaylock/quotes.txt 2>/dev/null || echo '„ÄĆ stay based „Äć')"
    color = rgba(6c7086aa)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, 30
    halign = center
    valign = bottom
}
